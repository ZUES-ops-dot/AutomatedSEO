# Railway deployment — https://docs.railway.app/deploy/config-as-code
# Add the Postgres plugin in the Railway UI and link DATABASE_URL to this service.

[build]
builder = "NIXPACKS"
nixpacksConfigOverlay = """
[phases.setup]
nixPkgs = ['nodejs_22', 'npm-10_x']

[phases.install]
cmds = ['npm install']

[phases.build]
cmds = ['npm run build']
"""

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
